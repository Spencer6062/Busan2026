                                        <span class="px-3 py-1.5 bg-amber-50 text-amber-700 rounded-lg font-bold border border-amber-200 shadow-sm">🚕 膠囊列車</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-lg font-bold border border-emerald-200 shadow-sm">🚶 X the SKY</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg font-medium shadow-sm">🚇 回西面飯店</span>
                                    </div>
                                </div>
                                
                                <!-- Day 2 -->
                                <div class="relative pl-6 border-l-2 border-amber-400">
                                    <div class="absolute w-4 h-4 bg-amber-500 rounded-full -left-[9px] top-1 ring-4 ring-white shadow-sm"></div>
                                    <h3 class="font-bold text-lg text-amber-800 mb-3">Day 2：西釜山與南區 (全線 Uber)</h3>
                                    <div class="flex flex-wrap items-center gap-y-3 text-sm md:text-base">
                                        <span class="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg font-medium shadow-sm">📍 西面飯店</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-amber-50 text-amber-700 rounded-lg font-bold border border-amber-200 shadow-sm">🚕 松島纜車</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-amber-50 text-amber-700 rounded-lg font-bold border border-amber-200 shadow-sm">🚕 甘川文化村</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-amber-50 text-amber-700 rounded-lg font-bold border border-amber-200 shadow-sm">🚕 釜山塔</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-lg font-bold border border-emerald-200 shadow-sm">🚶 南浦洞</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-amber-50 text-amber-700 rounded-lg font-bold border border-amber-200 shadow-sm">🚕 鑽石灣遊艇</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg font-medium shadow-sm">🚕 回西面晚餐</span>
                                    </div>
                                </div>

                                <!-- Day 3 -->
                                <div class="relative pl-6 border-l-2 border-purple-400">
                                    <div class="absolute w-4 h-4 bg-purple-500 rounded-full -left-[9px] top-1 ring-4 ring-white shadow-sm"></div>
                                    <h3 class="font-bold text-lg text-purple-800 mb-3">Day 3：樂天世界與機張購物</h3>
                                    <div class="flex flex-wrap items-center gap-y-3 text-sm md:text-base">
                                        <span class="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg font-medium shadow-sm">📍 西面飯店</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-blue-50 text-blue-700 rounded-lg font-bold border border-blue-200 shadow-sm">🚇 樂天世界</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-lg font-bold border border-emerald-200 shadow-sm">🚶 Lotte Outlet</span>
                                        <span class="text-slate-300 px-2">➔</span>
                                        <span class="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg font-medium shadow-sm">🚇 回西面/田浦</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 備註區塊 -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- PASS 核心守則 -->
                            <div class="bg-blue-50 border border-blue-100 rounded-xl p-6 shadow-sm">
                                <h3 class="text-lg font-bold text-blue-800 mb-4 flex items-center">
                                    <span class="mr-2">${icons.Ticket}</span> 釜山 PASS 核心守則
                                </h3>
                                <ul class="space-y-3 text-sm md:text-base text-blue-900 leading-relaxed">
                                    <li class="flex items-start"><span class="mr-2 text-blue-500 mt-0.5">✅</span> <span><b>黃金 48 小時：</b>Day 1 上午 10:30 在 Spa Land 啟用，Day 3 上午 10:29 失效。</span></li>
                                    <li class="flex items-start"><span class="mr-2 text-blue-500 mt-0.5">✅</span> <span><b>壓線入場技：</b>樂天世界 10:00 開門，務必在 10:29 前刷電子票進場，進場後待多久都可以！</span></li>
                                    <li class="flex items-start"><span class="mr-2 text-blue-500 mt-0.5">✅</span> <span><b>實體票兌換：</b>海邊小火車、纜車等項目可能需至售票處換實體票，請預留排隊時間。</span></li>
                                </ul>
                            </div>

                            <!-- 交通策略總結 -->
                            <div class="bg-amber-50 border border-amber-100 rounded-xl p-6 shadow-sm">
                                <h3 class="text-lg font-bold text-amber-800 mb-4 flex items-center">
                                    <span class="mr-2">🚕</span> 專屬交通策略 (黃金組合)
                                </h3>
                                <ul class="space-y-3 text-sm md:text-base text-amber-900 leading-relaxed">
                                    <li class="flex items-start"><span class="mr-2 text-amber-500 mt-0.5">💡</span> <span><b>完美互補：</b>長途/直線交給地鐵 (西面往返機張)，塞車/爬坡交給 Uber (西釜山)。</span></li>
                                    <li class="flex items-start"><span class="mr-2 text-amber-500 mt-0.5">💡</span> <span><b>預估花費：</b>若 2 人同行，三天包含 Uber 平攤及地鐵票，每人總車資不到 4 萬韓元 (約台幣 1000 內)，極度划算！</span></li>
                                    <li class="flex items-start"><span class="mr-2 text-amber-500 mt-0.5">💡</span> <span><b>Uber 提醒：</b>可直接用台灣 Uber App 叫車，過廣安大橋等過路費會於下車後自動加計在內。</span></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 原本的每日行程渲染
                const currentData = itineraryData.find(d => d.day === activeDay);
                
                const eventsHtml = currentData.events.map(event => {
                    let passHtml = event.isPass ? `<span class="ml-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-700 border border-blue-200"><span class="mr-1">${icons.Ticket}</span>${event.passLabel}</span>` : '';
                    let stayHtml = event.stay ? `<span class="text-xs font-medium text-slate-500 bg-slate-200/50 px-2 py-1 rounded mt-0 md:mt-2">${event.stay}</span>` : '';
                    let koreanHtml = event.korean ? `<p class="text-sm text-slate-500 mb-3 font-medium">${event.korean}</p>` : '';
                    let noteHtml = event.note ? `<p class="text-sm text-rose-600 bg-rose-50 border border-rose-100 inline-flex px-2 py-1 rounded-md mb-3 items-center font-medium"><span class="mr-1 inline-flex flex-shrink-0">${icons.Info}</span><span>${event.note}</span></p>` : '';
                    let mapLinkHtml = event.mapLink ? `<a href="${event.mapLink}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center text-sm text-emerald-600 hover:text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg transition-colors mb-4 shadow-sm border border-emerald-100"><span class="mr-1.5">${icons.MapPin}</span>Naver Map 導航<span class="ml-1.5 opacity-70">${icons.ExternalLink}</span></a>` : '';
                    
                    // --- 渲染新的交通卡片區塊 ---
                    let transportHtml = '';
                    if (event.transport) {
                        let bgClass = 'bg-slate-50 border-slate-200';
                        let titleClass = 'text-slate-700';
                        let methodIcon = '📍';
                        let methodTitle = '移動方式';

                        if (event.transport.type === 'subway') {
                            bgClass = 'bg-blue-50 border-blue-200';
                            titleClass = 'text-blue-800';
                            methodIcon = '🚇';
                            methodTitle = '地鐵 / 大眾運輸';
                        } else if (event.transport.type === 'uber') {
                            bgClass = 'bg-amber-50 border-amber-300';
                            titleClass = 'text-amber-900';
                            methodIcon = '🚕';
                            methodTitle = 'Uber (強烈推薦)';
                        } else if (event.transport.type === 'walk') {
                            bgClass = 'bg-emerald-50 border-emerald-200';
                            titleClass = 'text-emerald-800';
                            methodIcon = '🚶';
                            methodTitle = '步行 / 園區內';
                        }

                        let timeCostHtml = '';
                        if (event.transport.time || event.transport.cost) {
                            timeCostHtml = `
                                <div class="mt-2 pt-2 border-t border-slate-200/50 flex flex-wrap gap-x-4 gap-y-1 text-xs md:text-sm text-slate-600 font-medium">
                                    ${event.transport.time ? `<span class="flex items-center"><span class="mr-1 opacity-70">${icons.Clock}</span>預估時間：${event.transport.time}</span>` : ''}
                                    ${event.transport.cost ? `<span class="flex items-center"><span class="mr-1 opacity-70">💰</span>預估費用：${event.transport.cost}</span>` : ''}
                                </div>
                            `;
                        }

                        transportHtml = `
                            <div class="mt-3 ${bgClass} rounded-lg p-3 md:p-4 border shadow-sm transition-colors">
                                <div class="font-bold ${titleClass} mb-1.5 flex items-center text-sm md:text-base">
                                    <span class="mr-1.5 text-lg">${methodIcon}</span> ${methodTitle}
                                </div>
                                <div class="text-slate-700 text-sm md:text-base leading-relaxed">
                                    ${event.transport.text}
                                </div>
                                ${timeCostHtml}
                            </div>
                        `;
                    }

                    return `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow">
                        <div class="flex flex-col md:flex-row">
                            <div class="bg-slate-100 md:bg-white md:border-r border-slate-100 md:w-48 p-4 flex flex-row md:flex-col items-center md:items-start justify-between md:justify-start flex-shrink-0">
                                <div class="flex items-center text-blue-600 font-bold">
                                    <span class="mr-2">${icons.Clock}</span>
                                    ${event.time}
                                </div>
                                ${stayHtml}
                            </div>
                            <div class="p-4 md:p-6 flex-1">
                                <div class="flex flex-wrap items-start justify-between gap-2 mb-2">
                                    <h3 class="text-lg md:text-xl font-bold text-slate-800 flex items-center flex-wrap">
                                        ${event.title}
                                        ${passHtml}
                                    </h3>
                                </div>
                                ${koreanHtml}
                                ${noteHtml}
                                <div>${mapLinkHtml}</div>
                                ${transportHtml}
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');

                mainContentHtml = `
                    <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-8 rounded-r-lg shadow-sm flex items-start">
                        <span class="text-amber-500 mr-3 mt-0.5 flex-shrink-0">${icons.AlertCircle}</span>
                        <div>
                            <h3 class="font-bold text-amber-800 mb-1">今日重點與策略</h3>
                            <p class="text-amber-700 text-sm md:text-base">${currentData.strategy}</p>
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${eventsHtml}
                    </div>
                `;
            }

            // 組裝整體 HTML
            app.innerHTML = `
                <header class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white shadow-lg sticky top-0 z-50">
                    <div class="max-w-4xl mx-auto px-4 py-6">
                        <h1 class="text-2xl md:text-3xl font-bold mb-2 flex items-center">
                            <span class="mr-3">${icons.NavigationLg}</span>
                            釜山五天四夜：前三天精華行程
                        </h1>
                        <p class="text-blue-100 text-sm md:text-base">專為 48 小時釜山 PASS 與您專屬的交通策略打造</p>
                    </div>
                    <div class="flex px-4 max-w-4xl mx-auto overflow-x-auto no-scrollbar">
                        ${tabsHtml}
                    </div>
                </header>

                <main class="max-w-4xl mx-auto px-4 py-8">
                    ${mainContentHtml}
                </main>
                
                <footer class="bg-slate-800 text-slate-400 py-6 text-center text-sm">
                    <p>祝您有一趟完美的釜山之旅！</p>
                    <p class="mt-1 opacity-60">此網頁為客製化行程表，請務必搭配 Naver Map App 使用。</p>
                </footer>
            `;
        }

        // 4. 切換天數函數
        window.changeDay = function(day) {
            activeDay = day;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // 5. 初始化渲染
        render();
    </script>
</body>
</html>
